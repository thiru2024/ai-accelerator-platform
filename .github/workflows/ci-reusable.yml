name: Reusable CI Pipeline

on:
  workflow_call:

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout calling app repo
        uses: actions/checkout@v4
        with:
          path: app

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: app
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
          pip install -r requirements.txt

      - name: Read platform.yml
        id: platform_config
        working-directory: app
        run: |
          APP_NAME=$(python -c "import yaml; c=yaml.safe_load(open('platform.yml')); print(c['app_name'])")
          REGISTRY_NAME=$(python -c "import yaml; c=yaml.safe_load(open('platform.yml')); print(c['registry']['name'])")
          RESOURCE_GROUP=$(python -c "import yaml; c=yaml.safe_load(open('platform.yml')); print(c['azure']['resource_group'])")

          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT
          echo "registry_name=$REGISTRY_NAME" >> $GITHUB_OUTPUT
          echo "resource_group=$RESOURCE_GROUP" >> $GITHUB_OUTPUT

      - name: Validate platform.yml
        working-directory: app
        run: python scripts/validate_platform.py

      - name: Docker Login
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ steps.platform_config.outputs.registry_name }}.azurecr.io \
            --username ${{ steps.platform_config.outputs.registry_name }} \
            --password-stdin

      - name: Docker Build
        working-directory: app
        run: |
          docker build \
            -t ${{ steps.platform_config.outputs.registry_name }}.azurecr.io/${{ steps.platform_config.outputs.app_name }}:${{ github.sha }} \
            .

      - name: Docker Push
        run: |
          docker push \
            ${{ steps.platform_config.outputs.registry_name }}.azurecr.io/${{ steps.platform_config.outputs.app_name }}:${{ github.sha }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Container App
        run: |
          az containerapp update \
            --name ${{ steps.platform_config.outputs.app_name }} \
            --resource-group ${{ steps.platform_config.outputs.resource_group }} \
            --image ${{ steps.platform_config.outputs.registry_name }}.azurecr.io/${{ steps.platform_config.outputs.app_name }}:${{ github.sha }}