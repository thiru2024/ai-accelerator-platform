name: Reusable CI Pipeline

on:
  workflow_call:

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout App Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pyyaml
          pip install -r requirements.txt

      - name: Read platform.yml
        id: platform
        run: |
          APP_NAME=$(python -c "import yaml; print(yaml.safe_load(open('platform.yml'))['app_name'])")
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT

      - name: Validate platform.yml
        run: python scripts/validate_platform.py

      - name: Docker Login
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login crdemoaiapp12345.azurecr.io \
            --username crdemoaiapp12345 \
            --password-stdin

      - name: Docker Build
        run: |
          docker build \
            -t crdemoaiapp12345.azurecr.io/${{ steps.platform.outputs.app_name }}:${{ github.sha }} \
            .

      - name: Docker Push
        run: |
          docker push \
            crdemoaiapp12345.azurecr.io/${{ steps.platform.outputs.app_name }}:${{ github.sha }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Container App
        run: |
          az containerapp update \
            --name ${{ steps.platform.outputs.app_name }} \
            --resource-group rg-platform-shared \
            --image crdemoaiapp12345.azurecr.io/${{ steps.platform.outputs.app_name }}:${{ github.sha }}