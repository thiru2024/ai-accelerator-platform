name: Reusable CI Pipeline

on:
  workflow_call:

jobs:
  build-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pyyaml
          pip install -r requirements.txt

      - name: Validate platform.yml
        run: python scripts/validate_platform.py

      - name: Docker Login
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login crdemoaiapp12345.azurecr.io \
            --username crdemoaiapp12345 \
            --password-stdin

      - name: Docker Build
        run: |
          docker build \
          -t crdemoaiapp12345.azurecr.io/demo-ai-app:${{ github.sha }} .

      - name: Docker Push
        run: |
          docker push \
          crdemoaiapp12345.azurecr.io/demo-ai-app:${{ github.sha }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Container App
        run: |
          az containerapp update \
            --name demo-ai-app \
            --resource-group rg-platform-shared \
            --image crdemoaiapp12345.azurecr.io/demo-ai-app:${{ github.sha }}